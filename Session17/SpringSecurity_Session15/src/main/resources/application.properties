spring.application.name=SpringSecurity_Session15

#Config datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db_cntt2_cat_pro?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234$

#@Config jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config logging    Cấp độ log: TRACE  -   DEBUG  -  INFO   -  WARN   -  ERROR
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} -  %highlight(%-5level) - %cyan(%logger{50}) - %green(%msg%n)
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.ra.demo = INFO

#Config jwt
jwt-secret = daylachuoibimatduocsudungdetaorajwt
#Chuỗi token được tạo ra có thời gian hiệu lực trong 10'
jwt-expired = 600000
#Chuỗi refresh token có thời gian dài hơn  (ví dụ: 24h)
jwt-refresh-expired = 86400000

