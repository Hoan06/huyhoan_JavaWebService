spring.application.name=HN-KS24-CNTT2_NguyenHuyHoan_007

#Config datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/hackathon_api?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=13032006

#Config JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=100MB
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} - %-5level - %logger{50} - %msg%n
logging.console.enabled=true
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz
logging.level.root=INFO